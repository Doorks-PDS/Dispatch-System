<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Doorks — Atlas</title>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sideTop">
        <label class="field">
          <span>API Key</span>
          <input id="apiKey" type="password" placeholder="tech key"/>
        </label>

        <div class="btnRow">
          <button class="btn" id="newChat">+ New Chat</button>
          <button class="btn ghost" id="formsBtn">Forms</button>
        </div>

        <div class="uploadBox">
          <div class="smallMuted">Upload photo / PDF (adds a link into your message)</div>
          <div class="uploadRow">
            <input id="uploadFile" type="file" />
            <button class="btn primary" id="uploadBtn" style="width:auto; min-width:110px;">Upload</button>
          </div>
          <div id="attachmentsPreview" class="attachmentsPreview"></div>
        </div>

        <div id="status" class="status"></div>
      </div>

      <div class="threads" id="threads"></div>

      <div class="sidebarFooter">
        <div class="status">Enter = send • Shift+Enter = new line</div>
      </div>
    </aside>

    <main class="main">
      <header class="header">
        <div class="headerLeft">
          <div class="titleBlock">
            <div class="h1">Atlas</div>
            <div class="h2">Tech Assistant</div>
          </div>
        </div>

        <div class="brandBubble">
          <div class="logoCircle" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M8 3h9a2 2 0 0 1 2 2v16H8V3z" stroke="rgba(255,154,61,.95)" stroke-width="2" />
              <path d="M8 21H5V3h3" stroke="rgba(255,154,61,.95)" stroke-width="2" />
              <path d="M11 6h4" stroke="rgba(255,154,61,.70)" stroke-width="2" />
              <circle cx="15.5" cy="12" r="1" fill="rgba(255,154,61,.95)" />
            </svg>
          </div>
          <div class="doorks">DOORKS</div>
        </div>

        <div class="headerRight">
          <div class="toggle">
            <a class="pill active" href="/ui">Atlas</a>
            <a class="pill" href="/ui/moses">Moses</a>
          </div>
        </div>
      </header>

      <section class="chat" id="chat"></section>

      <footer class="composer">
        <textarea id="q" placeholder="Ask Atlas…"></textarea>
        <button class="searchBtn" id="send">Search</button>
      </footer>
    </main>
  </div>

  <script src="/static/app.js"></script>
  <script>
    new DoorksUI({ mode: "tech", pageName: "atlas", officeOnly: false, enableForms: true, enableUpload: true });
  </script>
</body>
</html>
